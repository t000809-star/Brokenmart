<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MiniMart</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #ffffff; color: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.5; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font: inherit; }

.nav { border-bottom: 1px solid #e5e7eb; background: #fff; position: sticky; top: 0; z-index: 50; }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.brand { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: #f97316; }
.nav-links { display: flex; gap: 24px; align-items: center; }
.nav-link { font-size: 14px; color: #374151; }
.nav-link:hover { color: #111827; }
.nav-cta { background: #f97316; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 500; }
.nav-cta:hover { background: #ea580c; }

main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; min-height: calc(100vh - 80px); }

.btn-primary { background: #f97316; color: #fff; padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 500; }
.btn-primary:hover { background: #ea580c; }
.button-primary { background: #f97316; color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 16px; font-weight: 500; }
.button-primary:hover { background: #ea580c; }
.primary-button { background: #f97316; color: #fff; padding: 12px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; width: 100%; text-align: center; display: block; }
.primary-button:hover { background: #ea580c; }
.btn-secondary { background: #fff; color: #374151; padding: 8px 16px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
.btn-secondary:hover { background: #f9fafb; }

.hero { background: linear-gradient(135deg, #fff7ed, #ffedd5); border-radius: 16px; padding: 80px 40px; text-align: center; margin-bottom: 32px; }
.hero h1 { font-size: 48px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 16px; }
.hero h1 span { color: #f97316; }
.hero p { font-size: 18px; color: #4b5563; margin-bottom: 32px; max-width: 480px; margin-left: auto; margin-right: auto; }

.trust-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 20px 24px; background: #fafaf9; border-radius: 8px; margin-bottom: 64px; }
@media (max-width: 768px) { .trust-strip { grid-template-columns: repeat(2, 1fr); } }
.trust-item { display: flex; gap: 12px; align-items: center; }
.trust-icon { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #f97316; }
.trust-title { font-size: 13px; font-weight: 600; }
.trust-sub { font-size: 12px; color: #6b7280; }

.section-heading { font-size: 24px; font-weight: 600; margin-bottom: 24px; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

.product-card { display: block; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; background: #fff; transition: box-shadow .15s; position: relative; }
.product-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
.product-card-image { aspect-ratio: 1; background: #f3f4f6; overflow: hidden; }
.product-card-image img { width: 100%; height: 100%; object-fit: cover; }
.product-card-body { padding: 16px; }
.product-card-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
.product-card-title { margin-top: 4px; font-size: 14px; font-weight: 500; color: #111827; line-height: 1.3; min-height: 36px; }
.product-card-price { margin-top: 8px; font-size: 16px; font-weight: 600; }

.product-card-2 { display: block; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; background: #fff; transition: box-shadow .15s; position: relative; }
.product-card-2:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
.product-card-2 .image-wrap { aspect-ratio: 1; background: #f3f4f6; overflow: hidden; }
.product-card-2 .image-wrap img { width: 100%; height: 100%; object-fit: cover; }
.product-card-2 .body-wrap { padding: 14px; }
.product-card-2 .cat { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
.product-card-2 .heading { margin-top: 4px; font-size: 14px; font-weight: 500; color: #111827; line-height: 1.3; min-height: 36px; }
.product-card-2 .price-tag { margin-top: 8px; font-size: 16px; font-weight: 600; }

.card-rating { display: flex; gap: 4px; align-items: center; margin-top: 6px; font-size: 11px; }
.card-stars { color: #f59e0b; letter-spacing: 0.5px; }
.card-reviews { color: #6b7280; }

.product-badge { position: absolute; top: 12px; left: 12px; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; z-index: 2; }
.product-badge.new { background: #dbeafe; color: #1e40af; }
.product-badge.sale { background: #fef3c7; color: #92400e; }
.product-badge.bestseller { background: #fce7f3; color: #9d174d; }

.category-tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
@media (min-width: 768px) { .category-tiles { grid-template-columns: repeat(4, 1fr); } }
.category-tile { display: block; aspect-ratio: 1; position: relative; overflow: hidden; border-radius: 8px; }
.category-tile img { width: 100%; height: 100%; object-fit: cover; transition: transform .15s; }
.category-tile:hover img { transform: scale(1.05); }
.category-tile .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.3); }
.category-tile .label { position: absolute; bottom: 16px; left: 16px; font-size: 18px; font-weight: 600; color: #fff; }

.why-us { background: #fafaf9; border-radius: 16px; padding: 48px 32px; margin-bottom: 64px; }
.why-us h2 { text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 32px; }
.why-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
@media (max-width: 768px) { .why-grid { grid-template-columns: 1fr 1fr; } }
.why-item { text-align: center; }
.why-icon { width: 56px; height: 56px; border-radius: 50%; background: #fff7ed; color: #f97316; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px; }
.why-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.why-sub { font-size: 13px; color: #6b7280; }

.testimonials { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 64px; }
@media (max-width: 768px) { .testimonials { grid-template-columns: 1fr; } }
.testimonial { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px; }
.testimonial .stars { color: #f59e0b; font-size: 16px; }
.testimonial .quote { color: #374151; font-size: 14px; margin: 12px 0 16px; line-height: 1.5; }
.testimonial .author { display: flex; gap: 12px; align-items: center; }
.testimonial .avatar { width: 40px; height: 40px; border-radius: 50%; background: #fed7aa; color: #9a3412; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
.testimonial .author-name { font-size: 13px; font-weight: 500; }
.testimonial .author-meta { font-size: 11px; color: #6b7280; }

.layout-with-sidebar { display: grid; grid-template-columns: 200px 1fr; gap: 32px; }
@media (max-width: 768px) { .layout-with-sidebar { grid-template-columns: 1fr; } }
.filters-side h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 12px; margin-top: 16px; }
.filters-side h3:first-child { margin-top: 0; }
.cat-btn { display: block; width: 100%; padding: 8px 12px; text-align: left; font-size: 14px; color: #374151; border-radius: 6px; transition: background .1s; }
.cat-btn:hover { background: #f9fafb; }
.cat-btn.active { background: #fff7ed; color: #c2410c; font-weight: 500; }
.search-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
input.search-input { flex: 1; min-width: 200px; max-width: 300px; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
select.sort-input { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; background: #fff; }
.results-count { font-size: 13px; color: #6b7280; margin-bottom: 24px; }

.detail-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
@media (max-width: 768px) { .detail-layout { grid-template-columns: 1fr; } }
.detail-image { aspect-ratio: 1; background: #f3f4f6; border-radius: 8px; overflow: hidden; }
.detail-image img { width: 100%; height: 100%; object-fit: cover; }
.detail-cat { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
.detail-name { margin-top: 8px; font-size: 32px; font-weight: 700; line-height: 1.15; }
.detail-rating { margin-top: 12px; display: flex; align-items: center; gap: 10px; font-size: 14px; }
.detail-rating .stars { color: #f59e0b; }
.detail-rating .reviews { color: #6b7280; font-size: 13px; }
.detail-price { margin-top: 16px; font-size: 30px; font-weight: 600; }
.detail-old-price { font-size: 16px; color: #9ca3af; text-decoration: line-through; margin-left: 10px; font-weight: 400; }
.stock-indicator { margin-top: 12px; font-size: 13px; color: #166534; display: flex; align-items: center; gap: 6px; }
.stock-indicator::before { content: "●"; color: #22c55e; font-size: 12px; }
.detail-desc { margin-top: 24px; color: #4b5563; }
.detail-desc p { margin-bottom: 12px; }
.detail-actions { margin-top: 32px; display: flex; gap: 16px; align-items: center; }
.icon-actions { margin-top: 16px; display: flex; gap: 12px; }
.icon-btn { display: flex; gap: 6px; align-items: center; padding: 8px 14px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 13px; color: #4b5563; background: #fff; }
.icon-btn:hover { background: #f9fafb; }
.detail-meta { margin-top: 32px; padding: 16px; background: #fafaf9; border-radius: 8px; font-size: 13px; color: #4b5563; line-height: 1.7; }
.detail-meta strong { color: #111827; }

.detail-tabs { margin-top: 64px; }
.tab-row { display: flex; gap: 32px; border-bottom: 1px solid #e5e7eb; margin-bottom: 24px; }
.tab-btn { padding: 14px 0; border-bottom: 2px solid transparent; color: #6b7280; font-size: 14px; font-weight: 500; transition: color .15s, border-color .15s; }
.tab-btn:hover { color: #111827; }
.tab-btn.active { color: #f97316; border-bottom-color: #f97316; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.spec-grid { display: grid; grid-template-columns: 200px 1fr; gap: 8px 32px; font-size: 14px; }
.spec-grid dt { color: #6b7280; padding: 6px 0; }
.spec-grid dd { color: #111827; padding: 6px 0; border-bottom: 1px solid #f3f4f6; }
.review { padding: 16px 0; border-bottom: 1px solid #f3f4f6; }
.review:last-child { border-bottom: none; }
.review-header { display: flex; gap: 12px; align-items: center; margin-bottom: 6px; }
.review-author { font-size: 14px; font-weight: 500; }
.review-date { color: #9ca3af; font-size: 12px; }
.review-stars { color: #f59e0b; font-size: 13px; }
.review-body { font-size: 14px; color: #4b5563; }

.related-section { margin-top: 64px; }
.related-section h2 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }

.qty-stepper { display: inline-flex; align-items: center; border: 1px solid #d1d5db; border-radius: 6px; }
.qty-stepper button { padding: 8px 12px; color: #4b5563; }
.qty-stepper button:hover { background: #f9fafb; }
.qty-stepper .qty-value { padding: 0 12px; font-size: 14px; font-weight: 500; min-width: 32px; text-align: center; }

.cart-layout { display: grid; grid-template-columns: 1fr 320px; gap: 48px; }
@media (max-width: 768px) { .cart-layout { grid-template-columns: 1fr; } }
.cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.cart-header h1 { font-size: 30px; font-weight: 700; }
.continue-shopping { font-size: 14px; color: #6b7280; }
.continue-shopping:hover { color: #111827; }
.cart-line { display: flex; gap: 16px; align-items: center; padding: 16px 0; border-bottom: 1px solid #e5e7eb; }
.cart-line img { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; }
.cart-line-info { flex: 1; }
.cart-line-name { font-size: 14px; font-weight: 500; }
.cart-line-price { font-size: 14px; color: #6b7280; }
.cart-line-total { width: 80px; text-align: right; font-size: 14px; font-weight: 600; }
.summary-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px; height: fit-content; }
.summary-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.summary-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
.summary-row.muted { color: #6b7280; }
.summary-divider { border-top: 1px solid #e5e7eb; margin-top: 8px; padding-top: 8px; font-size: 16px; font-weight: 600; }
.summary-row.discount { color: #16a34a; }
.shipping-note { font-size: 12px; color: #6b7280; margin-top: 12px; }
.promo-row { display: flex; gap: 8px; margin-top: 16px; }
.promo-row input { flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
.delivery-estimate { margin-top: 16px; padding: 12px; background: #fff7ed; border-radius: 6px; font-size: 13px; color: #9a3412; }
.cart-trust { margin-top: 16px; display: flex; gap: 6px; align-items: center; font-size: 12px; color: #6b7280; }

.order-review { margin-bottom: 32px; padding: 20px; background: #fafaf9; border-radius: 8px; }
.order-review h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.review-line { display: flex; gap: 12px; align-items: center; padding: 8px 0; }
.review-line img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; }
.review-line .info { flex: 1; font-size: 13px; }
.review-line .qty { font-size: 12px; color: #6b7280; }
.express-row { margin-bottom: 24px; }
.express-row h3 { font-size: 13px; color: #6b7280; margin-bottom: 8px; font-weight: 500; }
.express-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.express-btn { background: #111827; color: #fff; padding: 12px; border-radius: 6px; font-size: 13px; font-weight: 500; }
.express-btn:hover { opacity: 0.85; }
.trust-badges { margin-top: 16px; display: flex; gap: 8px; align-items: center; font-size: 12px; color: #6b7280; }

.form-narrow { max-width: 420px; margin: 0 auto; }
.form-narrow h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.form-narrow .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 32px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
.field input, .field textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
.error-banner { background: #fef2f2; color: #b91c1c; padding: 10px 12px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
.success-banner { background: #f0fdf4; color: #166534; padding: 24px; border-radius: 8px; border: 1px solid #bbf7d0; text-align: center; }
.success-banner h2 { font-size: 22px; font-weight: 600; }
.success-banner p { font-size: 14px; margin-top: 4px; }
.auth-meta { display: flex; justify-content: space-between; font-size: 14px; margin-top: 12px; }
.auth-meta a { color: #6b7280; }
.auth-meta a:hover { color: #111827; }
.auth-meta .right { color: #ea580c; }

.demo-banner { background: #fff7ed; border: 1px dashed #fdba74; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
.demo-banner-title { font-size: 14px; font-weight: 600; color: #9a3412; display: flex; align-items: center; gap: 6px; }
.demo-banner-sub { font-size: 13px; color: #9a3412; margin: 6px 0 12px; }
.demo-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.demo-btn { background: #fff; border: 1px solid #fdba74; color: #9a3412; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
.demo-btn:hover { background: #fed7aa; }
.demo-creds { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }

.divider-or { text-align: center; margin: 20px 0; font-size: 12px; color: #9ca3af; position: relative; }
.divider-or span { background: #fff; padding: 0 12px; position: relative; z-index: 1; }
.divider-or::before { content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: #e5e7eb; z-index: 0; }
.social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 480px) { .social-row { grid-template-columns: 1fr; } }
.social-btn { background: #fff; border: 1px solid #d1d5db; padding: 10px 12px; border-radius: 6px; font-size: 13px; display: flex; gap: 8px; align-items: center; justify-content: center; color: #374151; }
.social-btn:hover { background: #f9fafb; }

.account-layout { display: grid; grid-template-columns: 280px 1fr; gap: 48px; }
@media (max-width: 768px) { .account-layout { grid-template-columns: 1fr; } }
.account-header { display: flex; gap: 16px; align-items: center; margin-bottom: 32px; }
.account-avatar { width: 64px; height: 64px; border-radius: 50%; background: #fed7aa; color: #9a3412; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; flex-shrink: 0; }
.account-welcome { font-size: 26px; font-weight: 600; }
.account-meta { color: #6b7280; font-size: 13px; margin-top: 2px; }
.account-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
@media (max-width: 768px) { .account-stats { grid-template-columns: 1fr; } }
.account-stat { background: #fafaf9; border-radius: 8px; padding: 16px; text-align: center; }
.account-stat-value { font-size: 22px; font-weight: 600; }
.account-stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }
.account-side { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px; }
.account-side .field-group { margin-bottom: 16px; }
.account-side .field-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
.account-side .field-value { font-size: 14px; color: #111827; margin-top: 2px; }
.account-tabs { display: flex; gap: 24px; border-bottom: 1px solid #e5e7eb; margin-bottom: 24px; }
.order-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 12px; background: #fff; gap: 16px; }
.order-row a { color: #ea580c; font-size: 14px; font-weight: 500; }
.order-row a:hover { text-decoration: underline; }
.order-row .meta { color: #6b7280; font-size: 12px; margin-top: 2px; }
.order-row .total { font-size: 14px; font-weight: 600; }
.order-status { display: inline-flex; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.order-status.processing { background: #dbeafe; color: #1e40af; }
.order-status.shipped { background: #fef3c7; color: #92400e; }
.order-status.delivered { background: #dcfce7; color: #166534; }

.admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
@media (max-width: 768px) { .admin-stats { grid-template-columns: 1fr 1fr; } }
.admin-stat { border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; background: #fff; }
.admin-stat .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
.admin-stat .stat-value { font-size: 26px; font-weight: 600; margin-top: 8px; }
.admin-stat .stat-trend { font-size: 12px; color: #16a34a; margin-top: 4px; }
.admin-table { width: 100%; font-size: 14px; border-collapse: collapse; }
.admin-table thead th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; padding: 8px 0; border-bottom: 1px solid #e5e7eb; }
.admin-table tbody td { padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
.admin-pill { background: #fef2f2; color: #b91c1c; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
.admin-header p { color: #6b7280; font-size: 13px; }
.admin-section { margin-bottom: 40px; }
.admin-section h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

.order-detail-status { display: flex; align-items: center; gap: 16px; margin-top: 16px; padding: 16px; background: #fafaf9; border-radius: 8px; }
.order-timeline { display: flex; gap: 8px; margin: 32px 0; padding: 24px; background: #fafaf9; border-radius: 8px; }
.timeline-step { flex: 1; text-align: center; position: relative; }
.timeline-step:not(:last-child)::after { content: ""; position: absolute; top: 16px; right: -50%; width: 100%; height: 2px; background: #e5e7eb; z-index: 0; }
.timeline-step.done:not(:last-child)::after { background: #f97316; }

.timeline-dot.done { background: #f97316; color: #fff; }
.timeline-label { font-size: 11px; color: #6b7280; font-weight: 500; }

.muted { color: #6b7280; }

footer { background: #111827; color: #d1d5db; margin-top: 80px; padding: 64px 24px 24px; }

function makeFakeJwt(payload) {
  const enc = obj => btoa(JSON.stringify(obj)).replace(/=+$/, "").replace(/\+/g, "-").replace(/\//g, "_");
  const head = enc({ alg: "HS256", typ: "JWT" });
  const body = enc(payload);
  const sig = btoa(head + "." + body + ".minimart").replace(/=+$/, "").replace(/\+/g, "-").replace(/\//g, "_").slice(0, 32);
  return head + "." + body + "." + sig;
}

/* ---- RATING/BADGE METADATA (deterministic from product id) ---- */

function getProductMeta(product) {
  const i = parseInt(product.id, 10) || 0;
  const ratings = [4.2, 4.6, 4.8, 4.0, 4.7, 4.9, 4.3, 4.5, 5.0, 4.4];
  const rating = ratings[i % ratings.length];
  const reviews = 47 + ((i * 31) % 380);
  let badge = null;
  if ([1, 6, 18, 27].includes(i)) badge = "BESTSELLER";
  else if ([4, 11, 15, 22, 30].includes(i)) badge = "SALE";
  else if ([8, 16, 23, 28, 32].includes(i)) badge = "NEW";
  const stock = 3 + ((i * 7) % 25);
  const sold = 200 + (i * 47) % 1500;
  return { rating, reviews, badge, stock, sold };
}

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.4;
  let html = "";
  for (let i = 0; i < 5; i++) {
    if (i < full) html += "★";
    else if (i === full && half) html += "★";
    else html += "☆";
  }
  return html;
}

function renderBadge(badge) {
  if (!badge) return "";
  const cls = badge.toLowerCase();
  return '<span class="product-badge ' + cls + '">' + badge + '</span>';
}

  let products;
  try {
    products = await apiGetProductList();
  } catch (err) {
    grid.innerHTML = '<div class="empty-section">Loading...</div>';
    return;
  }

  function paint() {
    const list = [...products].sort((a, b) => {
      if (PRODUCTS_PAGE_STATE.sort === "price-asc") return a.price - b.price;
      if (PRODUCTS_PAGE_STATE.sort === "price-desc") return b.price - a.price;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    document.getElementById("results-count").textContent = "Showing " + list.length + " products";
    grid.innerHTML = list.length
      ? list.map(p => renderProductCardForList(p)).join("")
      : '<div class="empty-section">No products found.</div>';
  }
  paint();

  document.getElementById("search").addEventListener("input", e => {
    PRODUCTS_PAGE_STATE.search = e.target.value;
  });
  document.getElementById("sort").addEventListener("change", e => {
    PRODUCTS_PAGE_STATE.sort = e.target.value;
    paint();
  });
  document.querySelectorAll(".cat-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });
}

function renderCartLine(item) {
  return '<div class="cart-line" data-pid="' + item.productId + '">' +
           '<img src="' + item.image + '" />' +
           '<div class="cart-line-info">' +
             '<p class="cart-line-name">' + escapeHtml(item.name) + '</p>' +
             '<p class="cart-line-price">' + priceToString(item.price) + '</p>' +
           '</div>' +
           '<div class="qty-stepper">' +
             '<button class="line-dec">−</button>' +
             '<span class="qty-value line-qty">' + item.quantity + '</span>' +
             '<button class="line-inc">+</button>' +
           '</div>' +
           '<p class="cart-line-total">' + priceToString(item.price * item.quantity) + '</p>' +
         '</div>';
}

function attachCartLineHandlers() {
  document.querySelectorAll(".cart-line").forEach(row => {
    const pid = row.dataset.pid;
    const qtyEl = row.querySelector(".line-qty");
    const totalEl = row.querySelector(".cart-line-total");
    const item = CART.find(c => c.productId === pid);
    if (!item) return;
    let localQty = item.quantity;
    row.querySelector(".line-dec").addEventListener("click", () => {
      localQty = Math.max(1, localQty - 1);
      qtyEl.textContent = localQty;
      totalEl.textContent = priceToString(item.price * localQty);
    });
    row.querySelector(".line-inc").addEventListener("click", () => {
      localQty += 1;
      qtyEl.textContent = localQty;
      totalEl.textContent = priceToString(item.price * localQty);
    });
  });
}

let APPLIED_CODE = "";

function paintCartSummary() {
  const subtotal = CART.reduce((s, i) => s + i.price * i.quantity, 0);
  const tax = subtotal * 0.10;
  const discount = APPLIED_CODE === "WELCOME10" ? 1 : 0;
  const shipping = subtotal > 50 ? 0 : 5;
  const total = subtotal + tax + shipping - discount;

  const deliveryDate = new Date();
  deliveryDate.setDate(deliveryDate.getDate() + 3);
  const deliveryStr = deliveryDate.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });

  const summary = document.getElementById("cart-summary");
  if (!summary) return;
  summary.innerHTML =
    '<h2>Order summary</h2>' +
    '<div class="summary-row"><span class="muted">Subtotal</span><span>' + formatMoney(subtotal) + '</span></div>' +
    '<div class="summary-row"><span class="muted">Tax (10%)</span><span>' + formatMoney(tax) + '</span></div>' +
    '<div class="summary-row"><span class="muted">Shipping</span><span>' + (shipping === 0 ? "Free" : formatMoney(shipping)) + '</span></div>' +
    (discount > 0 ? '<div class="summary-row discount"><span>Discount (' + escapeHtml(APPLIED_CODE) + ')</span><span>−' + formatMoney(discount) + '</span></div>' : '') +
    '<div class="summary-row summary-divider"><span>Total</span><span>' + formatMoney(total) + '</span></div>' +
    '<p class="shipping-note">Free shipping on orders over $50</p>' +
    '<div class="promo-row">' +
      '<input id="promo-code" placeholder="Promo code" />' +
      '<button class="btn-secondary" id="apply-promo">Apply</button>' +
    '</div>' +
    '<a class="primary-button" href="#checkout" style="margin-top:24px">Checkout</a>' +
    (CART.length ? '<div class="delivery-estimate">Estimated delivery: ' + deliveryStr + '</div>' : '') +
    '<div class="cart-trust">' + ICON_LOCK + ' Secure checkout · 256-bit SSL</div>';
}

function attachPromoHandler() {
  const apply = document.getElementById("apply-promo");
  if (!apply) return;
  apply.addEventListener("click", () => {
    APPLIED_CODE = (document.getElementById("promo-code").value || "").trim();
    paintCartSummary();
    attachPromoHandler();
    if (APPLIED_CODE) showToast("Promo code applied");
  });
}

function placeOrder(totals) {
  const address = document.getElementById("ck-address").value;
  const card = document.getElementById("ck-card").value;

    items: CART.map(i => ({ ...i })),
    subtotal: totals.subtotal,
    tax: totals.tax,
    shipping: totals.shipping,
    discount: 0,
    total: totals.total,
    address,
    cardLast4: card.slice(-4) || "0000"
  });
  CART = [];
  renderNavbar();
  document.getElementById("app").innerHTML =
    '<div class="form-narrow"><div class="success-banner">' +
      '<h2>Order placed!</h2>' +

}

/* ---- ORDER DETAIL PAGE ---- */

function getOrderStatus(order) {
  const days = (Date.now() - new Date(order.createdAt).getTime()) / 86400000;
  if (days < 1) return { label: "Processing", cls: "processing", step: 1 };
  if (days < 4) return { label: "Shipped", cls: "shipped", step: 2 };
  if (days < 7) return { label: "Out for delivery", cls: "shipped", step: 3 };
  return { label: "Delivered", cls: "delivered", step: 4 };
}

function getTrackingNumber(orderId) {
  return "1Z999AA1" + String(orderId).padStart(8, "0");
}

async function renderOrderDetail(id) {
  const main = document.getElementById("app");
  main.innerHTML = '<div class="empty-section">Loading...</div>';
  let order;
  try {
    order = await apiGetOrder(id);
  } catch (e) {
    main.innerHTML = '<div class="empty-section">Order not found.</div>';
    return;
  }
  const status = getOrderStatus(order);
  const tracking = getTrackingNumber(order.id);
  main.innerHTML =
    '<a class="back-link" href="#home">← Back to home</a>' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-top:8px">' +
      '<div>' +
        '<h1 style="font-size:30px;font-weight:700">Order #' + order.id + '</h1>' +
        '<p class="muted" style="font-size:14px">Placed on ' + order.createdAt + '</p>' +
      '</div>' +
      '<span class="order-status ' + status.cls + '" style="font-size:13px;padding:6px 14px">' + status.label + '</span>' +
    '</div>' +
    '<div class="order-timeline">' +
      ['Placed','Shipped','Out for delivery','Delivered'].map((label, idx) => {
        const done = (idx + 1) <= status.step;
        return '<div class="timeline-step ' + (done ? "done" : "") + '">' +
                 '<div class="timeline-dot ' + (done ? "done" : "") + '">' + (done ? "✓" : (idx+1)) + '</div>' +
                 '<div class="timeline-label">' + label + '</div>' +
               '</div>';
      }).join("") +
    '</div>' +
    '<div class="tracking-row"><span><strong>Tracking:</strong> <span class="tracking-num">' + tracking + '</span></span><a href="#help/track" style="color:#ea580c">Track package →</a></div>' +
    '<div class="cart-layout" style="margin-top:32px">' +
      '<div>' +
        '<h2 style="font-size:18px;font-weight:600;margin-bottom:16px">Items</h2>' +
        '<ul style="list-style:none">' +
          order.items.map(item =>
            '<li style="display:flex;gap:16px;align-items:center;padding:16px 0;border-bottom:1px solid #e5e7eb">' +
              '<img src="' + item.image + '" style="width:64px;height:64px;border-radius:6px;object-fit:cover" />' +
              '<div style="flex:1">' +
                '<p style="font-size:14px;font-weight:500">' + escapeHtml(item.name) + '</p>' +
                '<p style="font-size:12px;color:#6b7280">Qty ' + item.quantity + '</p>' +
              '</div>' +
              '<span style="font-size:14px;font-weight:600">' + formatMoney(item.price * item.quantity) + '</span>' +
            '</li>'
          ).join('') +
        '</ul>' +
        '<button class="btn-secondary" style="margin-top:16px" id="reorder">Reorder</button>' +
      '</div>' +
      '<aside class="summary-box">' +
        '<div class="field-group"><div class="field-label">Shipping to</div><div class="field-value">' + escapeHtml(order.address) + '</div></div>' +
        '<div class="field-group" style="margin-top:12px"><div class="field-label">Payment</div><div class="field-value">Card ending in ' + escapeHtml(order.cardLast4) + '</div></div>' +
        '<div style="border-top:1px solid #e5e7eb;margin-top:16px;padding-top:16px">' +
          '<div class="summary-row"><span class="muted">Subtotal</span><span>' + formatMoney(order.subtotal) + '</span></div>' +
          '<div class="summary-row"><span class="muted">Tax</span><span>' + formatMoney(order.tax) + '</span></div>' +
          '<div class="summary-row"><span class="muted">Shipping</span><span>' + (order.shipping === 0 ? "Free" : formatMoney(order.shipping)) + '</span></div>' +
          '<div class="summary-row summary-divider"><span>Total</span><span>' + formatMoney(order.total) + '</span></div>' +
        '</div>' +
      '</aside>' +
    '</div>';
  const reorder = document.getElementById("reorder");
  if (reorder) reorder.addEventListener("click", () => {
    order.items.forEach(it => {
      const existing = CART.find(c => c.productId === it.productId);
      if (existing) existing.quantity += it.quantity;
      else CART.push({ ...it });
    });
    renderNavbar();
    showToast("Items added to cart");
    navigate("#cart");
  });
}

function doLogout() {

}

/* ---- ROUTER ---- */

function parseHashQuery() {
  const hash = window.location.hash.slice(1);
  const qIdx = hash.indexOf("?");
  if (qIdx === -1) return {};
  const qs = hash.slice(qIdx + 1);
  const out = {};
  qs.split("&").forEach(pair => {
    const [k, v] = pair.split("=");
    if (k) out[decodeURIComponent(k)] = decodeURIComponent(v || "");
  });
  return out;
}

function getHashRoute() {
  const hash = window.location.hash.slice(1);
  const qIdx = hash.indexOf("?");
  return qIdx === -1 ? hash : hash.slice(0, qIdx);
}

function handleRoute() {
  window.scrollTo(0, 0);
  const route = getHashRoute() || "home";
  const parts = route.split("/");
  const head = parts[0];
  if (head === "" || head === "home") return renderHome();
  if (head === "products") {
    const p = parseHashQuery();
    if (p.category) window.__pendingCategory = p.category;
    return renderProducts();
  }
  if (head === "product") return renderProductDetail(parts[1]);
  if (head === "cart") return renderCart();
  if (head === "checkout") return renderCheckout();
  if (head === "signin") return renderSignin();
  if (head === "signup") return renderSignup();
  if (head === "account") return renderAccount();
  if (head === "admin") return renderAdmin();
  if (head === "order") return renderOrderDetail(parts[1]);
  if (head === "help" || head === "about") {
    document.getElementById("app").innerHTML =
      '<div class="empty-section" style="padding:120px 16px"><h2 style="font-size:24px;font-weight:600;color:#374151">Coming soon</h2><p style="margin-top:8px">This page is part of the demo and isn\'t built out yet.</p><p style="margin-top:24px"><a class="btn-primary" href="#home">Back home</a></p></div>';
    return;
  }
  document.getElementById("app").innerHTML = '<div class="empty-section"><h2 style="font-size:24px;font-weight:600;color:#374151">404 — Page not found</h2><p style="margin-top:8px">The link you followed doesn\'t lead anywhere.</p><p style="margin-top:24px"><a class="btn-primary" href="#home">Back home</a></p></div>';
}

window.addEventListener("hashchange", handleRoute);
window.addEventListener("load", () => {
  const stored = localStorage.getItem("token");
  console.log("Auth token:", stored);
  if (stored) JWT_TOKEN = stored;
  const storedUser = localStorage.getItem("user");
  if (storedUser) { try { CURRENT_USER = JSON.parse(storedUser); } catch (e) {} }
  renderNavbar();
  renderFooter();
  handleRoute();
});

/* expose for debugging */
window.MM = { PRODUCTS, USERS, ORDERS, CART: () => CART, CURRENT_USER: () => CURRENT_USER, ADMIN_KEY, __debugUsers };
</script>
